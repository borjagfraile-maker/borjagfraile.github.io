<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Globo Estratégico | Silos ICBM y Centros de Mando</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: system-ui, sans-serif;
        }
        .ui-hidden {
            display: none !important;
        }
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 30;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: #fff;
            font-family: monospace;
            pointer-events: none;
            white-space: nowrap;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div id="loader" class="loader">🌍 Cargando datos geoestratégicos...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { initSilosAndCommands } from './silos.js';

        // ---------- CONFIGURACIÓN GLOBO (sin cambios) ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x030318);
        scene.fog = new THREE.FogExp2(0x030318, 0.00045);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0.7, 0.2, 3.0);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.07;
        controls.rotateSpeed = 0.25;
        controls.zoomSpeed = 0.9;
        controls.enablePan = true;
        controls.panSpeed = 0.35;
        controls.target.set(0, 0, 0);
        controls.minDistance = 1.2;
        controls.maxDistance = 4.0;

        // Estrellas de fondo
        const starGeo = new THREE.BufferGeometry();
        const starCount = 2800;
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPos[i*3] = (Math.random() - 0.5) * 900;
            starPos[i*3+1] = (Math.random() - 0.5) * 600;
            starPos[i*3+2] = (Math.random() - 0.5) * 400 - 120;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xaacdff, size: 0.13, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        const starGeo2 = new THREE.BufferGeometry();
        const starCount2 = 1800;
        const starPos2 = new Float32Array(starCount2 * 3);
        for (let i = 0; i < starCount2; i++) {
            starPos2[i*3] = (Math.random() - 0.5) * 1300;
            starPos2[i*3+1] = (Math.random() - 0.5) * 800;
            starPos2[i*3+2] = (Math.random() - 0.5) * 550 - 180;
        }
        starGeo2.setAttribute('position', new THREE.BufferAttribute(starPos2, 3));
        const starMat2 = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.09, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
        const stars2 = new THREE.Points(starGeo2, starMat2);
        scene.add(stars2);

        // Iluminación
        const ambient = new THREE.AmbientLight(0x20223a, 0.55);
        scene.add(ambient);
        const mainLight = new THREE.DirectionalLight(0xfff2e0, 1.1);
        mainLight.position.set(4, 3.5, 5);
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x4466aa, 0.5);
        fillLight.position.set(-2, 1, -3);
        scene.add(fillLight);
        const rimLight = new THREE.PointLight(0x88aaff, 0.6);
        rimLight.position.set(1.3, 1.5, -2.8);
        scene.add(rimLight);
        
        const earthMat = new THREE.MeshStandardMaterial({ color: 0x101a2a, roughness: 0.7, metalness: 0.15, emissive: 0x030714, emissiveIntensity: 0.1 });
        const earthSphere = new THREE.Mesh(new THREE.SphereGeometry(1.0, 128, 128), earthMat);
        scene.add(earthSphere);
        const atmosMat = new THREE.MeshPhongMaterial({ color: 0x7799cc, emissive: 0x112244, transparent: true, opacity: 0.08, side: THREE.BackSide });
        const atmosphere = new THREE.Mesh(new THREE.SphereGeometry(1.008, 96, 96), atmosMat);
        scene.add(atmosphere);
        
        const bordersGroup = new THREE.Group();
        scene.add(bordersGroup);
        
        const EARTH_RADIUS_VISUAL = 1.0;
        
        function geoToVector3(lon, lat) {
            const phi = (90 - lat) * Math.PI / 180;
            const theta = (-lon) * Math.PI / 180;
            const x = EARTH_RADIUS_VISUAL * Math.sin(phi) * Math.cos(theta);
            const y = EARTH_RADIUS_VISUAL * Math.cos(phi);
            const z = EARTH_RADIUS_VISUAL * Math.sin(phi) * Math.sin(theta);
            return new THREE.Vector3(x, y, z);
        }
        
        function alignToNorth(obj, pos, lat, lon) {
            const radial = pos.clone().normalize();
            let north = new THREE.Vector3(0, 1, 0).clone().sub(radial.clone().multiplyScalar(radial.y));
            if (north.length() < 0.001) north = new THREE.Vector3(1, 0, 0).cross(radial).normalize();
            else north.normalize();
            const east = north.clone().cross(radial).normalize();
            const matrix = new THREE.Matrix4();
            matrix.set(
                east.x, north.x, radial.x, 0,
                east.y, north.y, radial.y, 0,
                east.z, north.z, radial.z, 0,
                0, 0, 0, 1
            );
            const quaternion = new THREE.Quaternion().setFromRotationMatrix(matrix);
            obj.quaternion.copy(quaternion);
        }

        // ========== INICIALIZAR SILOS Y CENTROS DE MANDO DESDE MÓDULO EXTERNO ==========
        const { hoverableObjects: siloCommandObjects } = initSilosAndCommands(scene, geoToVector3, alignToNorth);

        // ========== BORDES GEOGRÁFICOS (sin cambios) ==========
        const UNIFORM_BORDER_COLOR = 0x6c8fc7;
        
        function addBorder(ring, color) {
            if(!ring || ring.length < 2) return;
            const points = [];
            for(let [lon, lat] of ring) {
                if(isFinite(lon) && isFinite(lat)) points.push(geoToVector3(lon, lat));
            }
            if(points.length < 2) return;
            const geom = new THREE.BufferGeometry().setFromPoints(points);
            bordersGroup.add(new THREE.Line(geom, new THREE.LineBasicMaterial({ color })));
        }
        
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(r => r.json())
            .then(data => {
                data.features.forEach(f => {
                    const geom = f.geometry;
                    if(!geom) return;
                    const coords = geom.coordinates;
                    if(geom.type === "Polygon") coords.forEach(r => addBorder(r, UNIFORM_BORDER_COLOR));
                    else if(geom.type === "MultiPolygon") coords.forEach(p => p.forEach(r => addBorder(r, UNIFORM_BORDER_COLOR)));
                });
                const loader = document.getElementById('loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.visibility = 'hidden', 800);
                }
            })
            .catch(() => {
                const loader = document.getElementById('loader');
                if (loader) {
                    loader.innerHTML = '⚠️ Fronteras simbólicas (azul suave)';
                    setTimeout(() => loader.style.opacity = '0', 2000);
                }
            });
        
        // ========== INTERACCIÓN HOVER (sin cambios) ==========
        let currentHovered = null;
        const hoverableObjects = [...siloCommandObjects]; // objetos devueltos por el módulo
        
        function resetHighlight() {
            if (!currentHovered) return;
            const obj = currentHovered;
            if (obj.lineRef) {
                obj.lineRef.scale.set(1, 1, 1);
                if (obj.type === 'commandCenter') {
                    obj.lineRef.material.color.setHex(obj.originalColor);
                    if (obj.name === "NORAD") starGlowNorad.intensity = 0.2;
                    else starGlowUssr.intensity = 0.2;
                } else if (obj.type === 'silo') {
                    obj.lineRef.material.color.setHex(obj.originalColor);
                }
            }
            currentHovered = null;
        }
        
        function applyHover(obj) {
            if (!obj) return;
            if (obj.lineRef) {
                obj.lineRef.scale.set(1.5, 1.5, 1);
                if (obj.type === 'commandCenter') {
                    obj.lineRef.material.color.setHex(0xffdd99);
                    if (obj.name === "NORAD") starGlowNorad.intensity = 0.7;
                    else starGlowUssr.intensity = 0.7;
                } else if (obj.type === 'silo') {
                    obj.lineRef.material.color.setHex(0xffffff);
                }
            }
        }
        
        const raycasterHover = new THREE.Raycaster();
        const mouseVec = new THREE.Vector2();
        
        function onMouseMove(event) {
            mouseVec.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouseVec.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycasterHover.setFromCamera(mouseVec, camera);
            const intersects = raycasterHover.intersectObjects(hoverableObjects);
            if (intersects.length) {
                const hit = intersects[0].object;
                const data = hit.userData;
                if (data) {
                    if (currentHovered === data) return;
                    resetHighlight();
                    currentHovered = data;
                    applyHover(data);
                } else {
                    resetHighlight();
                }
            } else {
                resetHighlight();
            }
        }
        window.addEventListener('mousemove', onMouseMove);
        
        // ========== ANIMACIONES Y RENDER (sin cambios) ==========
        function animateStars() {
            stars.rotation.y += 0.0002;
            stars2.rotation.y -= 0.00012;
            requestAnimationFrame(animateStars);
        }
        animateStars();
        
        function renderLoop() {
            requestAnimationFrame(renderLoop);
            controls.update();
            renderer.render(scene, camera);
        }
        renderLoop();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
